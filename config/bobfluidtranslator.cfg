# Configuration file

conversion {
    # Fluids in the blacklist do not receive an automatic mapping.
    # For more info visit https://github.com/Ezzocorbi/bob-fluid-translator/wiki/Configs
    #  [default: [NONE], [CUSTOM_DEMO]]
    S:fluidBlacklist <
        NONE
        CUSTOM_DEMO
     >

    # Overrides the automatic mapping by defining custom NTM to Forge fluid associations.
    # These take precedence over automatic mapping.
    # For more info visit https://github.com/Ezzocorbi/bob-fluid-translator/wiki/Configs
    #  [default: [WATZ=mud_fluid], [WATER=water], [LAVA=lava]]
    S:mappings <
        WATZ=mud_fluid
        WATER=water
        LAVA=lava
     >

    # Suffix used for automatically generated Forge fluid IDs.
    # Set to empty string for better compatibility with other mods.
    # Default value "_fluid" is kept for backward compatibility with
    # older versions of this mod, to avoid breaking existing worlds. [default: _fluid]
    S:suffix=_fluid
}


