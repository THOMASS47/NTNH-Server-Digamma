# Configuration file

##########################################################################################################
# general
#--------------------------------------------------------------------------------------------------------#
# GuideNH configuration
##########################################################################################################

general {

    ##########################################################################################################
    # debug
    #--------------------------------------------------------------------------------------------------------#
    # Debug section
    ##########################################################################################################

    debug {
        # Enable Debug Print Log [default: false]
        B:enableDebugMode=false
    }

    ##########################################################################################################
    # ui
    #--------------------------------------------------------------------------------------------------------#
    # UI section (persisted across sessions)
    ##########################################################################################################

    ui {
        # Whether clicking external links in guide markdown should show a confirmation dialog first. When false, external links open immediately. Default: true. [default: true]
        B:confirmExternalLinks=true

        # Global content zoom factor for the guide screen. Individual pages can override this with the 'zoom' frontmatter field. Default: 1.0. Range: 0.5 to 3.0. [range: 0.5 ~ 3.0, default: 1.0]
        S:contentZoom=1.0

        # Whether guide book opens in full-width layout (no side margins) [default: false]
        B:fullWidth=false

        # Side margin ratio applied to each side of guide content while using the optional narrow reading mode in full-width layout. Set to 0 to disable. A value of 0.15 leaves about 15% margin on both sides. [range: 0.0 ~ 0.45, default: 0.0]
        S:fullWidthNarrowReadingMarginRatio=0.0

        # Client-global bookmarked guide page ids, serialized as a pipe-delimited list. [default: ]
        S:guideBookmarks=

        # Whether advanced guide editor toolbar buttons start visible. [default: false]
        B:guideEditorAdvancedToolbarVisible=false

        # Debounce delay used before guide editor autosave writes to disk, in milliseconds. [range: -2147483648 ~ 2147483647, default: 500]
        I:guideEditorAutosaveDelayMillis=500

        # Whether the guide editor saves shortly after edits and when closing the screen. [default: true]
        B:guideEditorAutosaveEnabled=true

        # Default author name inserted into new guide pages. [default: GuideNH]
        S:guideEditorDefaultAuthor=GuideNH

        # Guide editor split divider position as a percentage from the left. [range: -2147483648 ~ 2147483647, default: 50]
        I:guideEditorDividerPercent=50

        # Whether the guide screen editor mode starts enabled. [default: false]
        B:guideEditorEnabled=false

        # Guide editor layout mode: 0 split, 1 editor only, 2 preview only. [range: -2147483648 ~ 2147483647, default: 0]
        I:guideEditorLayoutMode=0

        # Whether GuideScreen editor shows the NEI item panel outside the guide window when not full-width. [default: false]
        B:guideEditorNeiItemPanelOutsideWindow=false

        # Last path used by the guide editor new page dialog. [default: NewGuide.md]
        S:guideEditorNewPagePath=NewGuide.md

        # Whether the guide navigation sidebar is pinned open by default. [default: false]
        B:guideNavigationPinned=false

        # Maximum bookmarked guide pages shown on the home page. [range: -2147483648 ~ 2147483647, default: 10]
        I:homeBookmarkedPageLimit=10

        # Maximum recent history guide pages shown on the home page. [range: -2147483648 ~ 2147483647, default: 10]
        I:homeHistoryPageLimit=10

        # Maximum recommended guide pages shown on the home page. [range: -2147483648 ~ 2147483647, default: 30]
        I:homeRecommendedPageLimit=30

        # Manual GuideScreen window height in non-full-width layout, as a percentage of screen height. Set to 0 to use the automatic size. Valid values are clamped to 0 through 100. [range: -2147483648 ~ 2147483647, default: 0]
        I:nonFullWidthWindowHeightPercent=0

        # Manual GuideScreen window width in non-full-width layout, as a percentage of screen width. Set to 0 to use the automatic size. Valid values are clamped to 0 through 100. [range: -2147483648 ~ 2147483647, default: 0]
        I:nonFullWidthWindowWidthPercent=0

        # Client-global Region Wand export mode used for selection exports.
        # Possible values: [SNBT, SNBT_ENTITIES, BLOCKS, BLOCKS_ENTITIES]
        #  [default: SNBT]
        S:regionWandExportMode=SNBT

        # Whether the Region Wand selection box remains visible after switching away from the wand. [default: true]
        B:regionWandPersistentSelectionRender=true

        # Whether 3D scene previews show the block statistics toggle button by default. [default: true]
        B:sceneBlockStatsButtonEnabled=true

        # Whether 3D scene previews show the block statistics overlay by default. [default: false]
        B:sceneBlockStatsVisible=false

        # Whether scene editor auto-pick is enabled by default. This preference is persisted immediately after toggling in the editor. [default: false]
        B:sceneEditorAutoPickEnabled=false

        # Expanded width of the markdown panel in the scene editor. [range: -2147483648 ~ 2147483647, default: 208]
        I:sceneEditorMarkdownPanelWidth=208

        # Whether the markdown panel wraps lines in the scene editor. [default: true]
        B:sceneEditorMarkdownWrapEnabled=true

        # Default screenshot format used by the scene editor screenshot button. [default: png]
        S:sceneEditorScreenshotFormat=png

        # Default screenshot scale used by the scene editor screenshot button. [range: -2147483648 ~ 2147483647, default: 8]
        I:sceneEditorScreenshotScale=8

        # Whether block-center snapping is enabled in the scene editor by default. [default: false]
        B:sceneEditorSnapCenterEnabled=false

        # Whether scene editor snapping is enabled by default. This preference is persisted immediately after toggling in the editor. [default: false]
        B:sceneEditorSnapEnabled=false

        # Whether face snapping is enabled in the scene editor by default. [default: false]
        B:sceneEditorSnapFaceEnabled=false

        # Whether line snapping is enabled in the scene editor by default. [default: false]
        B:sceneEditorSnapLineEnabled=false

        # Whether point snapping is enabled in the scene editor by default. [default: true]
        B:sceneEditorSnapPointEnabled=true

        # Maximum undo history entries kept by the scene editor. [range: -2147483648 ~ 2147483647, default: 15]
        I:sceneEditorUndoHistoryLimit=15

        # Whether scene export features are available. This controls the scene editor, structure export commands, and Region Wand selection/export. On multiplayer servers this value is synced from the server. If the server does not have GuideNH installed, scene export is disabled. [default: true]
        B:sceneExportEnabled=true

        # Whether 3D scene previews show the layer slider by default. This can still be enabled per-scene from markdown. Default: true. [default: true]
        B:sceneLayerSliderEnabled=true

        # Maximum item columns per row when showing StructureLib block candidates in tooltips. [range: -2147483648 ~ 2147483647, default: 10]
        I:sceneStructureLibCandidateColumns=10

        # Maximum number of StructureLib block candidates shown per candidate grid in tooltips. Candidates beyond this limit are hidden and an ellipsis '...' is appended instead. Set to 0 to disable the limit. Default: 40. [range: -2147483648 ~ 2147483647, default: 40]
        I:sceneStructureLibCandidateMaxCount=40

        # Whether 3D scene preview swaps mouse drag buttons. When true, left drag rotates and right drag pans. When false, left drag pans and right drag rotates. Default: true. [default: true]
        B:sceneSwapMouseButtons=true

        # How long page-wheel scrolling temporarily blocks 3D preview wheel interactions. Value is in milliseconds. Default: 750. [range: -2147483648 ~ 2147483647, default: 750]
        I:sceneWheelInteractionDelayMillis=750

        # Whether mouse wheel scroll zooms the 3D scene preview (while cursor is over it). When false, scroll always goes to page scroll. Default: true. [default: true]
        B:sceneWheelZoom=true
    }

    ##########################################################################################################
    # runtimebridge
    #--------------------------------------------------------------------------------------------------------#
    # Runtime bridge section. The bridge is disabled by default and requires a client restart.
    ##########################################################################################################

    runtimebridge {
        # Whether the GuideNH runtime bridge WebSocket server is enabled. Default: false. [default: false]
        B:enabled=false

        # Runtime bridge host. No default is provided; set this explicitly when enabling the bridge. [default: ]
        S:host=

        # Maximum concurrent runtime bridge connections. [range: -2147483648 ~ 2147483647, default: 2]
        I:maxConnections=2

        # Maximum semantic delta entries sent in one message. [range: -2147483648 ~ 2147483647, default: 200]
        I:maxDeltaEntries=200

        # Maximum accepted WebSocket message size in bytes. [range: -2147483648 ~ 2147483647, default: 262144]
        I:maxMessageBytes=262144

        # Maximum semantic query page size. [range: -2147483648 ~ 2147483647, default: 200]
        I:maxPageSize=200

        # Maximum subscriptions per connection. [range: -2147483648 ~ 2147483647, default: 16]
        I:maxSubscriptions=16

        # Runtime bridge port. No default is provided; set this explicitly when enabling the bridge. [range: -2147483648 ~ 2147483647, default: 0]
        I:port=0

        # Runtime bridge authentication token. Empty values prevent the bridge from starting. [default: ]
        S:token=
    }

}


