# Configuration file

TitleCard {
    S:"Align X"=0.5
    S:"Align Y"=0.0
    I:"Offset X"=-128
    I:"Offset Y"=0
    S:"Title Texture"=gtnh:textures/gui/gtnh_title.png
}


general {
    # If true, always draw implicit dependency. This property can be changed by the GUI [default: false]
    B:"Always draw implicit dependency"=false

    # If true, directional arrows on quest dependency lines will animate on quest hover. [default: true]
    B:"Animate dependency arrows"=true

    # If true, then when you Claim all quests, choice rewards will be randomly selected [default: false]
    B:"Claim all random select choice rewards"=false

    # If true, then when you click on Claim all, a warning dialog will be displayed [default: true]
    B:"Claim all requires confirmation"=true

    # If true, rewards will be disabled. This might not be supported by reward types. [default: false]
    B:"Disable rewards"=false

    # If true, quest titles and text content will show no color. This property can be changed by the GUI. [default: false]
    B:"Force Monochrome Text"=false
    B:"Hide Updates"=false

    # If true, render each hotzone using alternating color. [default: false]
    B:"Highlight detected clickable url hotzone."=false

    # Does an equivalent of '/bq_admin default load' on every world load [default: true]
    B:"Load the default quest DB on world startup."=true

    # Is quest chapters list locked and opened on start. [default: false]
    B:"Lock tray"=true

    # Posts useful information in the log when encountering a null quest during loading. [default: true]
    B:"Log null quests"=true

    # Clamps the max UI height (-1 to disable) [range: -1 ~ 2147483647, default: -1]
    I:"Max GUI Height"=-1

    # Clamps the max UI width (-1 to disable) [range: -1 ~ 2147483647, default: -1]
    I:"Max GUI Width"=-1

    # How long quest notifications stay on screen (seconds) [range: 1.0 ~ 15.0, default: 4.5]
    S:"Notification Duration"=4.5

    # Cinematic completion effect: 0 = none, 3 = hyperspace, 4 = singularity, 5 = warp, 6 = lightspeed [range: 0 ~ 6, default: 0]
    I:"Notification Effect Tier"=0

    # How quickly the notification appears (seconds). 0 = instant [range: 0.0 ~ 5.0, default: 0.5]
    S:"Notification Fade In"=0.5

    # How quickly the notification disappears (seconds). 0 = instant [range: 0.0 ~ 5.0, default: 1.0]
    S:"Notification Fade Out"=1.0

    # Internal: set once the player opens the notification settings, hides the one-time hint. [default: false]
    B:"Notification Hint Seen"=true

    # Icon animation style during fade-in: none, fly_in, spin [default: none]
    S:"Notification Icon Animation"=none

    # Vertical offset for the quest icon in pixels. Negative = higher, positive = lower. [range: -100 ~ 100, default: -25]
    I:"Notification Icon Offset Y"=-25

    # Size of the quest icon in title notifications (default 4.0 = 64x64 pixels) [range: 0.5 ~ 8.0, default: 4.0]
    S:"Notification Icon Scale"=4.0

    # Particle effect on quest completion: none, confetti, sparkle, firework, item_confetti [default: none]
    S:"Notification Particle"=none

    # How quest notifications display: 'title' (large centered text), 'classic' (small popup with icon), 'off' (disabled) [default: title]
    S:"Notification Style"=title

    # Size of the subtitle text in notifications (0 = use global GTNHLib setting) [range: 0.0 ~ 8.0, default: 0.0]
    S:"Notification Subtitle Scale"=0.0

    # Horizontal offset of the notification from screen center, in pixels. Negative = left, positive = right. [range: -1000 ~ 1000, default: 0]
    I:"Notification Title Offset X"=0

    # Vertical offset of the notification from screen center, in pixels. Negative = higher, positive = lower. [range: -1000 ~ 1000, default: 0]
    I:"Notification Title Offset Y"=0

    # Size of the title text in notifications (0 = use global GTNHLib setting) [range: 0.0 ~ 8.0, default: 0.0]
    S:"Notification Title Scale"=0.0

    # Enabled the popup notices when quests are completed or updated [default: true]
    B:"Quest Notices"=true

    # Scrolling multiplier [range: 0.0 ~ 10.0, default: 1.0]
    S:"Scroll multiplier"=1.0

    # Show the quest item icon with notifications [default: true]
    B:"Show Notification Icon"=true

    # If true, quest dependency lines will render directional arrows. This property can be changed by the GUI. [default: true]
    B:"Show dependency arrows"=true

    # If true will skip home gui and open quests at startup. This property will be changed by the mod itself. [default: false]
    B:"Skip home"=false
    S:"Sound Complete"=random.levelup
    S:"Sound Unlock"=random.click
    S:"Sound Update"=random.levelup

    # Correcting the width of split text [range: 0.01 ~ 10.0, default: 1.0]
    S:"Text Width Correction"=1.0

    # The current questing theme [default: betterquesting:light]
    S:Theme=midnight:dark

    # If true, all users can use /bq_admin commands regardless of op-status. Useful for single-player without cheats. [default: false]
    B:"Unrestrict Admin Commands"=false

    # Jumps the user to the last opened quest [default: true]
    B:"Use Quest Bookmark"=true

    # If true, user can view not-yet-unlocked quests that are not hidden or secret. This property can be changed by the GUI. [default: false]
    B:"View mode"=false

    # If true, view mode will display the quest line regardless of whether the quest line is unlocked yet. [default: true]
    B:"View mode all quest line"=true

    # If true, show view mode button. [default: false]
    B:"View mode button"=true

    # Zoom Speed [range: 1.05 ~ 3.0, default: 1.25]
    S:"Zoom Speed"=1.25

    # Zoom in on cursor. If false, zooms in on center of screen. [default: true]
    B:"Zoom in on cursor"=true

    # Zoom out on cursor. If false, zooms out on center of screen. [default: true]
    B:"Zoom out on cursor"=true

    # Zoom smoothness in ms [range: 0.0 ~ 2000.0, default: 100.0]
    S:"Zoom smoothness in ms"=100.0
}


