# Configuration file

client {
    # Maximum number of columns shown in the baubles inventory.
    #  [range: 1 ~ 2147483647, default: 4]
    I:maxColumns=4

    # Use the old Baubles Button texture and location instead.
    #  [default: false]
    B:useOldGuiButton=false

    # Display the old Bauble GUI instead of the new sidebar.
    # Using old rendering with more than 20 slots works, but results in visual oddities and is not supported.
    #  [default: false]
    B:useOldRendering=false
}


debug {
    # Hides the Bauble debug item from the creative menu.
    #  [default: true]
    B:hideDebugItem=true
}


general {
    # IDs of enchantments that should be treated as soul bound when on items in a bauble slot.
    I:soulBoundEnchantments <
     >
}


menu {
    # When hovering the mouse over a bauble slot, display a tooltip with the bauble type and if a held item can be equipped in that slot.
    #  [default: true]
    B:displayTooltipOnHover=true

    # Manually override slot assignments.
    # !Bauble slot types must be configured manually with this option enabled!
    #  [default: false]
    B:manualSlotSelection=false

    # Display unused Bauble slots.
    #  [default: false]
    B:showUnusedSlots=false
}


override {
    # Baubles and its addons assigned the folowing types to the bauble slots.
    # !This config option automatically changes to reflect what Baubles and its addons assigned each time the game is launched! [default: ]
    S:defualtSlotTypes <
        amulet
        ring
        ring
        belt
        Terminal
        charm_pouch
        wings
     >

    # Per-slot-type stack limits in the format "type=limit" (example: heartcanister_red=10).
    # Unspecified types default to a stack limit of 1.
    #  [default: ]
    S:slotStackLimitOverrides <
     >

    # Slot assignments to use if manualSlotSelection is enabled.
    # !Adding, moving, or removing slots of the amulet, ring, or belt types will reduce compatibility with mods made for original Baubles versions!
    #  [default: [amulet], [ring], [ring], [belt]]
    S:slotTypeOverrides <
        amulet
        ring
        ring
        belt
     >

    # Bauble types listed here are also allowed in universal slots.
    # Use registered slot type names like ring, amulet, belt.
    #  [default: ]
    S:slotUniversalOverrides <
     >
}


server {
    B:splitSurvivalCreative=false
}


